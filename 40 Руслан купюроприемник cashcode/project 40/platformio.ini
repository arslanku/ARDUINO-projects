[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps = 
	arduino-libraries/Servo@^1.2.2
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	https://github.com/ssilver2007/LCD_1602_RUS_ALL.git
	fastled/FastLED@^3.9.14
	gyverlibs/microLED@^3.6
	; gyverlibs/EncButton@^3.7.2
	gyverlibs/GyverButton@^3.8
