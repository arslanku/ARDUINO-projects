[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
lib_deps = 
	gyverlibs/EEManager@^2.0
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	gyverlibs/EncButton@^3.4
	gyverlibs/microDS18B20@^3.10
