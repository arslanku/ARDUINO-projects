[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps = 
	arduino-libraries/Servo@^1.1.8
	gyverlibs/ServoSmooth@^3.9
	gyverlibs/EncButton@^2.0
	gyverlibs/GyverTM1637@^1.4.2
